services:
  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_USER: quto
      POSTGRES_PASSWORD: quto_secret_2026
      POSTGRES_DB: quto
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quto -d quto"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    container_name: bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_URL: postgresql+asyncpg://quto:quto_secret_2026@db:5432/quto

volumes:
  pgdata:
