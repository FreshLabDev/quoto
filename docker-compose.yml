services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quoto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-quoto}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quoto} -d ${POSTGRES_DB:-quoto}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Built from the POSTGRES_* vars so no credentials live in this file.
      DB_URL: postgresql+asyncpg://${POSTGRES_USER:-quoto}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-quoto}
      # Force UTF-8 for stdout/stderr so emoji in logs don't get mangled
      PYTHONIOENCODING: "utf-8"
      PYTHONUNBUFFERED: "1"
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    volumes:
      - logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  pgdata:
  logs:
